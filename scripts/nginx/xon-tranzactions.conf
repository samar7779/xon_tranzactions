# Xon Tranzaksiyalar — nginx reverse proxy
# /etc/nginx/sites-available/xon-tranzactions
#
# Foydalanish:
#   1. server_name'ni o'z domeningizga moslang
#   2. SSL uchun certbot ishlatib qo'ying: certbot --nginx -d xon.example.com

server {
    listen 80;
    listen [::]:80;
    server_name _;   # FIX ME: o'zingizning domain (xon.example.com)

    client_max_body_size 10M;

    # Backend API + Swagger + Deploy webhook
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /docs {
        proxy_pass http://127.0.0.1:3001/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
