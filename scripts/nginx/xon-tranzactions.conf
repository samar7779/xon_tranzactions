# Xon Tranzaksiyalar — nginx reverse proxy
# /etc/nginx/sites-available/xon-tranzactions
#
# SSL: certbot --nginx -d transactions.xonapps.uz tomonidan avto-sozlanadi.
# Birinchi marta sozlash: bash scripts/setup-domain.sh

server {
    listen 80;
    listen [::]:80;
    server_name transactions.xonapps.uz;

    # Excel import katta fayllar uchun (200MB gacha)
    client_max_body_size 200M;
    client_body_timeout 600s;

    # Backend API + Swagger + Deploy webhook
    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Katta import uchun timeout va body limit
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 200M;
    }

    location = /docs {
        return 301 /docs/;
    }
    location /docs/ {
        proxy_pass http://127.0.0.1:3001/docs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
